<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lecteur</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --cream:#f5f0e8;--tan:#e8dece;--walnut:#5c3d2e;--walnut-lt:#7a5240;
  --terra:#c4623a;--terra-lt:#d4825a;--mustard:#c9972a;
  --charcoal:#2e2a25;--ink:#1a1714;--paper:#faf7f2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);}

/* ── LIBRARY ── */
#lib-header{
  background:var(--charcoal);padding:0 1.2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;border-bottom:3px solid var(--terra);
}
#lib-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;letter-spacing:0.06em;color:var(--cream);}
#lib-header h1 em{color:var(--terra);font-style:italic;}
.hdr-right{display:flex;align-items:center;gap:8px;}

/* edit button — plain button, no file input tricks */
#edit-mode-btn{
  background:transparent;border:1.5px solid rgba(245,240,232,0.3);color:var(--tan);
  height:40px;padding:0 14px;border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:400;
  letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;
}

/* add button label sitting on top of hidden input */
.add-wrap{position:relative;height:40px;min-width:80px;}
.add-label{
  position:absolute;inset:0;
  background:var(--terra);color:var(--cream);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;pointer-events:none;
}
/* The input is the actual interactive element */
#file-input{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:0;cursor:pointer;
  /* iOS Safari: font-size>=16px prevents auto-zoom */
  font-size:16px;
}

#shelf-wrap{padding:1.5rem 1.2rem 4rem;max-width:960px;margin:0 auto;}

#empty-state{text-align:center;padding:4rem 1rem;}
#empty-state .icon{font-size:2.8rem;opacity:0.35;display:block;margin-bottom:1rem;}
#empty-state p{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--walnut-lt);line-height:2;opacity:0.7;}

.shelf-unit{margin-bottom:2rem;}
.shelf-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--walnut-lt);margin-bottom:0.5rem;font-weight:500;}
.shelf-board{
  background:var(--walnut);border-radius:2px 2px 0 0;
  padding:1.1rem 1rem 0.9rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;
  box-shadow:0 5px 0 var(--walnut-lt),0 8px 18px rgba(0,0,0,0.2);position:relative;
}
.shelf-board::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--terra),var(--mustard),var(--terra));border-radius:2px 2px 0 0;opacity:0.5;}

.book-card{width:calc(20% - 0.82rem);max-width:90px;position:relative;transition:transform 0.18s;flex-shrink:0;cursor:pointer;}
.book-card:active{transform:translateY(-4px) scale(0.97);}
.book-card:not(.edit-mode-active):hover{transform:translateY(-6px);}
@media(max-width:480px){.book-card{width:calc(25% - 0.78rem);}}

.spine-wrap{width:100%;padding-top:150%;border-radius:1px 4px 4px 1px;overflow:hidden;position:relative;box-shadow:-2px 2px 10px rgba(0,0,0,0.5);}
.spine-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.spine-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(20,16,12,0.8));padding:1rem 0.35rem 0.35rem;font-size:0.58rem;color:#fff;line-height:1.3;word-break:break-all;}
.spine-nocover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.4rem;text-align:center;}
.spine-nocover .si{font-size:1.2rem;margin-bottom:0.3rem;opacity:0.75;}
.spine-nocover .st{font-size:0.55rem;line-height:1.3;word-break:break-all;font-family:'Playfair Display',serif;font-style:italic;}
.spine-edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(0,0,0,0.22);}

/* delete button — shown in edit mode */
.del-btn{
  display:none;position:absolute;top:-6px;right:-6px;
  background:var(--terra);border:none;color:#fff;
  width:22px;height:22px;border-radius:50%;font-size:0.72rem;
  align-items:center;justify-content:center;cursor:pointer;z-index:5;
}
body.edit .del-btn{display:flex;}

.book-meta{font-size:0.58rem;color:var(--tan);margin-top:0.4rem;text-align:center;}

/* edit bar at bottom */
#edit-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--charcoal);border-top:2px solid var(--terra);
  padding:0.8rem 1.2rem;justify-content:space-between;align-items:center;z-index:100;
}
body.edit #edit-bar{display:flex;}
#edit-bar p{font-size:0.8rem;color:var(--tan);font-weight:300;}
#edit-done{
  background:var(--terra);border:none;color:var(--cream);
  padding:0 20px;height:40px;border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;font-weight:500;
}

/* ── READER ── */
#reader{display:none;position:fixed;inset:0;background:#1e1a16;flex-direction:column;align-items:center;z-index:200;}
#reader.on{display:flex;}

#r-top{
  width:100%;background:var(--ink);border-bottom:2px solid var(--terra);
  height:52px;padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#r-back,#r-fs{
  background:transparent;border:1px solid rgba(245,240,232,0.2);color:var(--tan);
  height:36px;padding:0 14px;border-radius:3px;
  font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
}
#r-title{font-family:'Playfair Display',serif;font-style:italic;font-size:0.9rem;color:var(--tan);max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#book-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:0.8rem;overflow:hidden;}
#book{
  position:relative;display:flex;
  border-radius:2px 8px 8px 2px;
  box-shadow:-12px 5px 36px rgba(0,0,0,0.75),5px 4px 18px rgba(0,0,0,0.35);
  overflow:hidden;background:var(--paper);
}
.pside{flex:1;position:relative;overflow:hidden;background:var(--paper);}
#lside{border-right:1px solid #ddd4c0;box-shadow:inset -8px 0 20px rgba(0,0,0,0.08);cursor:pointer;}
#rside{box-shadow:inset 8px 0 20px rgba(0,0,0,0.05);cursor:pointer;}
.pcanvas{width:100%;height:100%;display:block;}
.pnum{position:absolute;bottom:10px;font-family:'Playfair Display',serif;font-size:0.65rem;color:#b0a090;pointer-events:none;font-style:italic;}
#lside .pnum{left:14px;}
#rside .pnum{right:14px;}
#spine{position:absolute;left:50%;top:0;bottom:0;transform:translateX(-50%);width:12px;pointer-events:none;z-index:5;background:linear-gradient(to right,rgba(0,0,0,0.14) 0%,rgba(196,98,58,0.09) 45%,rgba(196,98,58,0.09) 55%,rgba(0,0,0,0.14) 100%);}

/* flip */
#flip{position:absolute;top:0;right:0;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;pointer-events:none;z-index:20;display:none;}
#flip.fwd{display:block;animation:ffwd 0.48s cubic-bezier(0.38,0,0.28,1) forwards;}
#flip.bwd{display:block;animation:fbwd 0.48s cubic-bezier(0.38,0,0.28,1) forwards;}
@keyframes ffwd{0%{transform:rotateY(0deg)}100%{transform:rotateY(-180deg)}}
@keyframes fbwd{0%{transform:rotateY(-180deg)}100%{transform:rotateY(0deg)}}
.fface,.fbface{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);overflow:hidden;}
.fbface{transform:rotateY(180deg);}
.fface canvas,.fbface canvas{width:100%;height:100%;display:block;}
.fshade{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.09) 0%,transparent 30%);pointer-events:none;}

#r-bot{
  width:100%;background:var(--ink);border-top:1px solid rgba(196,98,58,0.2);
  height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.nbtn{
  background:transparent;border:1.5px solid rgba(196,98,58,0.32);color:var(--tan);
  width:44px;height:44px;border-radius:50%;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.nbtn:active{transform:scale(0.9);}
.nbtn:disabled{opacity:0.15;pointer-events:none;}
#pinfo{font-family:'Playfair Display',serif;font-style:italic;font-size:0.82rem;color:rgba(232,222,206,0.45);text-align:center;}
#pinfo strong{color:var(--tan);font-weight:400;}

/* ── FULLSCREEN ── */
#fsview{display:none;position:fixed;inset:0;background:#0c0906;z-index:500;align-items:center;justify-content:center;}
#fsview.on{display:flex;}
#fscanvas{max-width:100%;max-height:100vh;display:block;}
#fsbtn{position:fixed;top:14px;right:14px;background:rgba(196,98,58,0.5);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── LOADING ── */
#loadscreen{display:none;position:fixed;inset:0;background:rgba(22,18,14,0.93);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
#loadscreen.on{display:flex;}
#loadmsg{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--tan);}
.ptrack{width:180px;height:2px;background:rgba(196,98,58,0.18);}
.pfill{height:100%;background:var(--terra);transition:width 0.3s;width:0%;}

/* ── TOAST ── */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(46,42,37,0.95);color:var(--cream);padding:9px 18px;border-radius:18px;font-size:0.8rem;opacity:0;transition:opacity 0.28s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library-screen">
  <div id="lib-header">
    <h1>Lec<em>teur</em></h1>
    <div class="hdr-right">
      <button id="edit-mode-btn" type="button">編集</button>
      <div class="add-wrap">
        <div class="add-label">＋ 追加</div>
        <input type="file" id="file-input" accept=".pdf,application/pdf">
      </div>
    </div>
  </div>
  <div id="shelf-wrap">
    <div id="empty-state">
      <span class="icon">▭</span>
      <p>本棚はまだ空です<br>「＋ 追加」でPDFを選んでください</p>
    </div>
    <div id="shelf-grid"></div>
  </div>
</div>

<div id="edit-bar">
  <p>✕ ボタンで削除</p>
  <button id="edit-done" type="button">完了</button>
</div>

<!-- READER -->
<div id="reader">
  <div id="r-top">
    <button id="r-back" type="button">← 本棚</button>
    <div id="r-title">—</div>
    <button id="r-fs" type="button">全画面</button>
  </div>
  <div id="book-wrap">
    <div id="book">
      <div class="pside" id="lside">
        <canvas class="pcanvas" id="cleft"></canvas>
        <span class="pnum" id="nleft"></span>
      </div>
      <div id="spine"></div>
      <div class="pside" id="rside">
        <canvas class="pcanvas" id="cright"></canvas>
        <span class="pnum" id="nright"></span>
      </div>
      <div id="flip">
        <div class="fface"><canvas id="cff"></canvas><div class="fshade"></div></div>
        <div class="fbface"><canvas id="cfb"></canvas></div>
      </div>
    </div>
  </div>
  <div id="r-bot">
    <button class="nbtn" id="prev" type="button" disabled>◀</button>
    <div id="pinfo">—</div>
    <button class="nbtn" id="next" type="button">▶</button>
  </div>
</div>

<!-- FULLSCREEN -->
<div id="fsview">
  <canvas id="fscanvas"></canvas>
  <button id="fsbtn" type="button">✕</button>
</div>

<!-- LOADING -->
<div id="loadscreen">
  <p id="loadmsg">読み込み中…</p>
  <div class="ptrack"><div class="pfill" id="pfill"></div></div>
</div>

<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let lib=[],pdf=null,spread=0,pages=0,busy=false;
const KEY='lecteur_ios_v1';

// ── PERSIST ──
function save(){try{localStorage.setItem(KEY,JSON.stringify(lib));}catch(e){showToast('容量不足です。本を削除してください');}}
function load(){try{const r=localStorage.getItem(KEY);if(r)lib=JSON.parse(r);}catch(e){lib=[];}}

// ── TOAST ──
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2600);
}

// ── LOADING ──
function showLoad(msg,pct){
  const s=document.getElementById('loadscreen');
  s.classList.add('on');
  document.getElementById('loadmsg').textContent=msg;
  document.getElementById('pfill').style.width=pct+'%';
}
function hideLoad(){document.getElementById('loadscreen').classList.remove('on');}

// ── FILE INPUT ──
// iOS Safari local files: 'change' event sometimes never fires.
// Belt-and-suspenders: listen on change + input + window focus polling.
const fi=document.getElementById('file-input');
let _handled=false;

function handleFile(){
  const f=fi.files&&fi.files[0];
  if(!f||_handled)return;
  _handled=true;
  setTimeout(()=>{_handled=false;},1500);
  if(!f.name.toLowerCase().endsWith('.pdf')&&f.type!=='application/pdf'){
    showToast('PDFファイルを選んでください');return;
  }
  readFileIOS(f);
  // reset value after a tick so same file can be picked again
  setTimeout(()=>{try{fi.value='';}catch(e){}},100);
}

fi.addEventListener('change',handleFile);
fi.addEventListener('input',handleFile);

// Fallback: iOS sometimes fires nothing until window gets focus back
window.addEventListener('focus',function(){
  setTimeout(function(){
    if(fi.files&&fi.files[0]&&!_handled)handleFile();
  },400);
});

// Extra fallback: poll briefly after the file picker closes (touchend on wrapper)
document.querySelector('.add-wrap').addEventListener('touchend',function(){
  [500,1000,1800].forEach(function(ms){
    setTimeout(function(){
      if(fi.files&&fi.files[0]&&!_handled)handleFile();
    },ms);
  });
},{passive:true});

function readFileIOS(file){
  showLoad('ファイルを読み込み中…',10);
  const reader=new FileReader();
  reader.onerror=function(){hideLoad();showToast('読み込みに失敗しました');};
  reader.onload=async function(){
    try{
      // Convert base64 dataURL to Uint8Array
      const dataUrl=reader.result;
      const base64=dataUrl.split(',')[1];
      const binary=atob(base64);
      const copy=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++)copy[i]=binary.charCodeAt(i);
      showLoad('ページ数を確認中…',45);
      const pdfdoc=await pdfjsLib.getDocument({data:copy}).promise;
      showLoad('表紙を生成中…',65);
      const cover=await genCover(pdfdoc);
      showLoad('保存中…',85);
      // Save the base64 directly from dataURL — no re-encoding needed
      const b64=base64;      const id='b'+Date.now();
      const name=file.name.replace(/\.pdf$/i,'');
      lib.push({id,name,data:b64,pages:pdfdoc.numPages,cover,ts:Date.now()});
      save();hideLoad();
      renderLib();
      showToast('「'+name+'」を追加しました');
    }catch(err){
      hideLoad();
      const msg=err&&err.message?err.message:'不明なエラー';
      showToast('エラー: '+msg.slice(0,40));
      console.error(err);
    }
  };
  reader.readAsDataURL(file);
}

async function genCover(pdfdoc){
  try{
    const p=await pdfdoc.getPage(1);
    const vp=p.getViewport({scale:0.5});
    const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
    await p.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv.toDataURL('image/jpeg',0.7);
  }catch{return null;}
}

function uint8ToB64(bytes){
  let s='',chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    s+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  }
  return btoa(s);
}
function bufToB64(buf){return uint8ToB64(new Uint8Array(buf));}
function b64ToBuf(b64){
  const s=atob(b64),buf=new ArrayBuffer(s.length),v=new Uint8Array(buf);
  for(let i=0;i<s.length;i++)v[i]=s.charCodeAt(i);
  return buf;
}

// ── RENDER LIBRARY ──
const PALS=[['#c4623a','#f5f0e8'],['#2e5266','#d4e8d6'],['#5c6e2e','#f5f0e0'],['#7a3b4e','#f0e6d8'],['#4a5568','#e8e0d0'],['#8b5e2e','#f5ead0']];
function hsh(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h;}

function renderLib(){
  const grid=document.getElementById('shelf-grid');
  const empty=document.getElementById('empty-state');
  grid.innerHTML='';
  if(!lib.length){empty.style.display='block';return;}
  empty.style.display='none';
  const SZ=5;
  for(let i=0;i<lib.length;i+=SZ){
    const unit=document.createElement('div');unit.className='shelf-unit';
    const lbl=document.createElement('div');lbl.className='shelf-label';lbl.textContent='Shelf '+(Math.floor(i/SZ)+1);
    const board=document.createElement('div');board.className='shelf-board';
    lib.slice(i,i+SZ).forEach(b=>board.appendChild(makeCard(b)));
    unit.appendChild(lbl);unit.appendChild(board);grid.appendChild(unit);
  }
}

function makeCard(book){
  const [bg,fg]=PALS[Math.abs(hsh(book.id))%PALS.length];
  const card=document.createElement('div');card.className='book-card';

  const wrap=document.createElement('div');wrap.className='spine-wrap';wrap.style.background=bg;
  if(book.cover){
    const img=document.createElement('img');img.src=book.cover;img.alt='';
    const ov=document.createElement('div');ov.className='spine-overlay';ov.textContent=book.name;
    wrap.appendChild(img);wrap.appendChild(ov);
  }else{
    const nc=document.createElement('div');nc.className='spine-nocover';
    nc.innerHTML='<div class="si">◻</div><div class="st" style="color:'+fg+'">'+escHtml(book.name)+'</div>';
    wrap.appendChild(nc);
  }
  const edge=document.createElement('div');edge.className='spine-edge';wrap.appendChild(edge);

  // delete button
  const del=document.createElement('button');del.className='del-btn';del.type='button';del.textContent='✕';
  del.addEventListener('click',function(e){
    e.stopPropagation();
    if(confirm('「'+book.name+'」を削除しますか？')){
      lib=lib.filter(b=>b.id!==book.id);save();renderLib();
    }
  });

  const meta=document.createElement('div');meta.className='book-meta';meta.textContent=book.pages+' pp.';

  card.appendChild(wrap);card.appendChild(del);card.appendChild(meta);
  card.addEventListener('click',function(){
    if(!document.body.classList.contains('edit'))openBook(book.id);
  });
  return card;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── EDIT MODE ──
document.getElementById('edit-mode-btn').addEventListener('click',function(){
  document.body.classList.add('edit');
});
document.getElementById('edit-done').addEventListener('click',function(){
  document.body.classList.remove('edit');
});

// ── OPEN BOOK ──
async function openBook(id){
  const book=lib.find(b=>b.id===id);if(!book)return;
  showLoad('ページを展開中…',20);
  try{
    pdf=await pdfjsLib.getDocument({data:b64ToBuf(book.data)}).promise;
    pages=pdf.numPages;spread=0;
    document.getElementById('r-title').textContent=book.name;
    document.getElementById('library-screen').style.display='none';
    document.getElementById('reader').classList.add('on');
    hideLoad();
    // Wait for layout to complete before rendering pages
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    await renderSpread(0);
    updateNav();
  }catch(err){hideLoad();const msg=err&&err.message?err.message:'不明';showToast('エラー: '+msg.slice(0,50));console.error(err);}
}

document.getElementById('r-back').addEventListener('click',function(){
  document.getElementById('reader').classList.remove('on');
  document.getElementById('library-screen').style.display='block';
  pdf=null;
});

// ── SPREAD RENDER ──
function sp(s){return[s*2+1,s*2+2];}
function total(){return Math.ceil(pages/2);}

async function renderSpread(s){
  const[lp,rp]=sp(s);
  const bk=document.getElementById('book');
  const W=Math.max(bk.clientWidth/2, window.innerWidth/2-20);
  const H=Math.max(bk.clientHeight, window.innerHeight-140);
  await Promise.all([
    drawPage(document.getElementById('cleft'),lp,W,H),
    drawPage(document.getElementById('cright'),rp,W,H)
  ]);
  document.getElementById('nleft').textContent=lp<=pages?lp:'';
  document.getElementById('nright').textContent=rp<=pages?rp:'';
  updateInfo();
}

async function drawPage(cv,pn,W,H){
  const ctx=cv.getContext('2d');
  if(pn>pages){cv.width=Math.round(W);cv.height=Math.round(H);ctx.fillStyle='#faf7f2';ctx.fillRect(0,0,cv.width,cv.height);return;}
  const page=await pdf.getPage(pn);
  const pv=page.getViewport({scale:1});
  const scale=Math.min(W/pv.width,H/pv.height);
  const vp=page.getViewport({scale});
  cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
  ctx.fillStyle='#faf7f2';ctx.fillRect(0,0,cv.width,cv.height);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
}

// ── FLIP ANIMATION ──
async function goNext(){
  if(busy||spread>=total()-1)return;busy=true;
  const ns=spread+1,bk=document.getElementById('book');
  const W=Math.max(bk.clientWidth/2,window.innerWidth/2-20);
  const H=Math.max(bk.clientHeight,window.innerHeight-140);
  const[,rc]=sp(spread),[ln]=sp(ns);
  await drawPage(document.getElementById('cff'),rc,W,H);
  await drawPage(document.getElementById('cfb'),ln,W,H);
  animate('fwd',async()=>{spread=ns;await renderSpread(spread);updateNav();busy=false;});
}

async function goPrev(){
  if(busy||spread<=0)return;busy=true;
  const ps=spread-1,bk=document.getElementById('book');
  const W=Math.max(bk.clientWidth/2,window.innerWidth/2-20);
  const H=Math.max(bk.clientHeight,window.innerHeight-140);
  const[lc]=sp(spread),[,rp]=sp(ps);
  await drawPage(document.getElementById('cfb'),lc,W,H);
  await drawPage(document.getElementById('cff'),rp,W,H);
  animate('bwd',async()=>{spread=ps;await renderSpread(spread);updateNav();busy=false;});
}

function animate(dir,cb){
  const fl=document.getElementById('flip');
  fl.className='';void fl.offsetWidth;
  fl.className=dir==='fwd'?'fwd':'bwd';
  fl.addEventListener('animationend',async()=>{fl.className='';fl.style.display='none';await cb();},{once:true});
}

document.getElementById('lside').addEventListener('click',goPrev);
document.getElementById('rside').addEventListener('click',goNext);
document.getElementById('prev').addEventListener('click',goPrev);
document.getElementById('next').addEventListener('click',goNext);

// swipe
let tx=0;
document.getElementById('book').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('book').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?goNext():goPrev();}
});

function updateNav(){
  document.getElementById('prev').disabled=spread<=0;
  document.getElementById('next').disabled=spread>=total()-1;
}
function updateInfo(){
  const[lp,rp]=sp(spread);
  const label=rp<=pages?(lp+' – '+rp):String(lp);
  document.getElementById('pinfo').innerHTML='<strong>'+label+'</strong> / '+pages;
}

// ── FULLSCREEN ──
async function openFS(){
  if(!pdf)return;
  const[lp]=sp(spread);
  const page=await pdf.getPage(Math.min(lp,pages));
  const vp=page.getViewport({scale:2.5});
  const cv=document.getElementById('fscanvas');
  cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
  const c=cv.getContext('2d');c.fillStyle='#faf7f2';c.fillRect(0,0,cv.width,cv.height);
  await page.render({canvasContext:c,viewport:vp}).promise;
  document.getElementById('fsview').classList.add('on');
}
document.getElementById('r-fs').addEventListener('click',openFS);
document.getElementById('rside').addEventListener('dblclick',openFS);
document.getElementById('fsbtn').addEventListener('click',()=>document.getElementById('fsview').classList.remove('on'));
document.getElementById('fsview').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});

// ── INIT ──
load();renderLib();
</script>
