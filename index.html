<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lecteur">
<meta name="theme-color" content="#708c7c">
<title>Lecteur</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&family=Cormorant:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:        #708c7c;
  --bg-deep:   #4e6859;
  --bg-deeper: #3a5044;
  --bg-light:  #8aa598;
  --bg-pale:   #e6e2db;
  --text:      #1c2e24;
  --text-mid:  #3a5244;
  --text-muted:#587060;
  --text-pale: #ccddd5;
  --paper:     #f8faf8;
  --shelf:     #3d5848;
  --shelf-shadow:#2e4438;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-pale);color:var(--text);}

/* ── LIBRARY ── */
#lib-header{
  background:var(--bg-deeper);padding:0 1.4rem;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
#lib-header h1{
  font-family:'Josefin Sans',sans-serif;font-weight:100;
  font-size:1.25rem;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--bg-pale);
}
.hdr-right{display:flex;align-items:center;gap:8px;}
#edit-mode-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.22);color:var(--text-pale);
  height:36px;padding:0 14px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;
}
.add-wrap{position:relative;height:36px;min-width:74px;}
.add-label{
  position:absolute;inset:0;
  background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.3);
  color:var(--bg-pale);border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:400;
  letter-spacing:0.14em;text-transform:uppercase;pointer-events:none;
}
#file-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px;}

#shelf-wrap{padding:1.8rem 1.2rem 4rem;max-width:960px;margin:0 auto;}
#empty-state{text-align:center;padding:5rem 1rem;}
#empty-state .icon{font-size:2.2rem;opacity:0.25;display:block;margin-bottom:1.2rem;}
#empty-state p{font-family:'Cormorant',serif;font-style:italic;font-size:1.05rem;color:var(--text-muted);line-height:2.2;}

.shelf-unit{margin-bottom:2.4rem;}
.shelf-label{
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:0.58rem;letter-spacing:0.24em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:0.6rem;
}
.shelf-board{
  background:var(--shelf);border-radius:2px 2px 0 0;
  padding:1.1rem 1rem 1rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;
  box-shadow:0 5px 0 var(--shelf-shadow),0 8px 20px rgba(0,0,0,0.18);
  position:relative;
}
.shelf-board::before{
  content:'';position:absolute;left:0;right:0;top:0;height:1px;
  background:rgba(255,255,255,0.18);
}

.book-card{width:calc(20% - 0.82rem);max-width:90px;position:relative;transition:transform 0.18s;flex-shrink:0;cursor:pointer;}
.book-card:active{transform:translateY(-5px) scale(0.97);}
@media(max-width:480px){.book-card{width:calc(25% - 0.78rem);}}
.spine-wrap{width:100%;padding-top:150%;border-radius:1px 4px 4px 1px;overflow:hidden;position:relative;box-shadow:-2px 3px 10px rgba(0,0,0,0.4);}
.spine-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.spine-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,18,14,0.85));padding:1rem 0.35rem 0.35rem;font-size:0.58rem;color:#fff;line-height:1.3;word-break:break-all;}
.spine-nocover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.4rem;text-align:center;}
.spine-nocover .si{font-size:1.1rem;margin-bottom:0.3rem;opacity:0.7;}
.spine-nocover .st{font-size:0.55rem;line-height:1.35;word-break:break-all;font-family:'Cormorant',serif;font-style:italic;}
.spine-edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(0,0,0,0.2);}
.del-btn{display:none;position:absolute;top:-6px;right:-6px;background:#b04040;border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:0.72rem;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
body.edit .del-btn{display:flex;}
.book-meta{font-size:0.57rem;color:rgba(255,255,255,0.4);margin-top:0.4rem;text-align:center;letter-spacing:0.04em;}

#edit-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-deeper);border-top:1px solid rgba(255,255,255,0.1);padding:0.8rem 1.4rem;justify-content:space-between;align-items:center;z-index:100;}
body.edit #edit-bar{display:flex;}
#edit-bar p{font-size:0.76rem;color:var(--text-pale);font-weight:300;letter-spacing:0.06em;}
#edit-done{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:var(--bg-pale);padding:0 18px;height:36px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.76rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;}

/* ── READER ── */
#reader{
  display:none;position:fixed;inset:0;
  background:var(--bg);
  flex-direction:column;align-items:center;z-index:200;
  touch-action:none;
}
#reader.on{display:flex;}

#r-top{
  width:100%;background:var(--bg);
  border-bottom:1px solid rgba(255,255,255,0.1);
  height:50px;padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#r-back,#r-fs{
  background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--text-pale);
  height:32px;padding:0 12px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;
}
#r-back:active,#r-fs:active{background:rgba(255,255,255,0.08);}
#r-title{
  font-family:'Cormorant',serif;font-style:italic;font-weight:300;
  font-size:0.92rem;color:rgba(255,255,255,0.5);
  max-width:52%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── READER ── */
#reader{
  display:none;position:fixed;inset:0;
  background:var(--bg);
  flex-direction:column;align-items:center;z-index:200;
}
#reader.on{display:flex;}

#page-wrap{
  flex:1;width:100%;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  touch-action:none;
}
#zoom-layer{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  transform-origin:0 0;
  will-change:transform;
  width:100%;height:100%;
}
.page-cv{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity 0.22s ease;
}
.page-cv canvas{display:block;max-width:100%;max-height:100%;}
#cv-a{opacity:1;z-index:2;}
#cv-b{opacity:0;z-index:1;}

#fs-hint{
  display:none;position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.32);color:rgba(255,255,255,0.6);
  padding:6px 16px;border-radius:20px;
  font-family:'DM Sans',sans-serif;font-size:0.68rem;letter-spacing:0.08em;
  pointer-events:none;white-space:nowrap;z-index:10;
  animation:fadeout 2.5s forwards;
}
@keyframes fadeout{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

#r-bot{
  width:100%;background:var(--bg);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:0.55rem 1.2rem 0.5rem;
  display:flex;flex-direction:column;gap:0.45rem;flex-shrink:0;
}
.bot-row{display:flex;align-items:center;justify-content:space-between;}
.nbtn{
  background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--text-pale);
  width:40px;height:40px;border-radius:50%;font-size:0.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.nbtn:active{transform:scale(0.9);}
.nbtn:disabled{opacity:0.15;pointer-events:none;}
#pinfo{
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:0.72rem;letter-spacing:0.14em;
  color:rgba(204,221,213,0.5);text-align:center;flex:1;
}
#pinfo strong{color:var(--text-pale);font-weight:300;}

#scrub-row{position:relative;padding:0 2px 2px;}
#scrub-track{
  width:100%;height:3px;background:rgba(255,255,255,0.12);
  border-radius:2px;position:relative;cursor:pointer;
}
#scrub-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  left:0%;pointer-events:none;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
#scrub-preview{
  display:none;position:absolute;bottom:12px;
  background:var(--paper);border-radius:3px;
  box-shadow:0 4px 18px rgba(0,0,0,0.28);
  overflow:hidden;pointer-events:none;
  transform:translateX(-50%);
  border:1px solid rgba(112,140,124,0.25);min-width:80px;
}
#scrub-preview.show{display:block;}
#scrub-cv{display:block;}
#scrub-pnum{
  text-align:center;padding:3px 0 4px;
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  letter-spacing:0.1em;font-size:0.6rem;
  color:var(--text-muted);border-top:1px solid rgba(0,0,0,0.06);
}

/* ── BOOKMARKS ── */
#r-bm{
  background:transparent;border:1px solid rgba(255,255,255,0.18);
  color:var(--text-pale);height:32px;padding:0 10px;border-radius:2px;
  font-size:0.85rem;cursor:pointer;
}
#bm-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;
}
#bm-overlay.on{display:block;}
#bm-panel{
  display:none;position:fixed;top:0;right:0;bottom:0;
  width:min(320px,88vw);
  background:var(--bg-pale);z-index:301;
  flex-direction:column;
  box-shadow:-4px 0 24px rgba(0,0,0,0.25);
}
#bm-panel.on{display:flex;}
#bm-header{
  background:var(--bg-deeper);padding:0 1rem;height:52px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
#bm-title{
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text-pale);flex:1;
}
#bm-add{
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);
  color:var(--text-pale);padding:0 10px;height:30px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:0.68rem;letter-spacing:0.08em;
  text-transform:uppercase;cursor:pointer;white-space:nowrap;
}
#bm-close{
  background:transparent;border:none;color:rgba(255,255,255,0.4);
  font-size:1rem;cursor:pointer;padding:4px;line-height:1;
}
#bm-list{flex:1;overflow-y:auto;padding:0.5rem 0;}
#bm-empty{
  display:none;padding:3rem 1.5rem;text-align:center;
  font-family:'Cormorant',serif;font-style:italic;
  font-size:0.95rem;color:var(--text-muted);
}
.bm-item{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1rem;cursor:pointer;
  border-bottom:1px solid rgba(0,0,0,0.06);
  transition:background 0.15s;
}
.bm-item:hover{background:rgba(112,140,124,0.08);}
.bm-item:active{background:rgba(112,140,124,0.15);}
.bm-icon{font-size:1rem;flex-shrink:0;opacity:0.6;}
.bm-info{flex:1;min-width:0;}
.bm-page{
  font-family:'Josefin Sans',sans-serif;font-weight:300;
  font-size:0.78rem;letter-spacing:0.1em;color:var(--text);
}
.bm-label{
  font-family:'Cormorant',serif;font-style:italic;
  font-size:0.8rem;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:1px;
}
.bm-del{
  background:transparent;border:none;color:var(--text-muted);
  font-size:0.9rem;cursor:pointer;padding:4px 6px;opacity:0.5;
  flex-shrink:0;
}
.bm-del:hover{opacity:1;color:#b04040;}
#loadscreen{display:none;position:fixed;inset:0;background:rgba(58,80,68,0.96);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
#loadscreen.on{display:flex;}
#loadmsg{font-family:'Cormorant',serif;font-style:italic;font-size:1rem;color:var(--text-pale);}
.ptrack{width:160px;height:1px;background:rgba(255,255,255,0.15);}
.pfill{height:100%;background:rgba(255,255,255,0.45);transition:width 0.3s;width:0%;}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(58,80,68,0.96);color:var(--text-pale);padding:8px 18px;border-radius:20px;font-size:0.76rem;letter-spacing:0.04em;opacity:0;transition:opacity 0.28s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library-screen">
  <div id="lib-header">
    <h1>Lecteur</h1>
    <div class="hdr-right">
      <button id="edit-mode-btn" type="button">編集</button>
      <div class="add-wrap">
        <div class="add-label">＋ 追加</div>
        <input type="file" id="file-input" accept=".pdf,application/pdf">
      </div>
    </div>
  </div>
  <div id="shelf-wrap">
    <div id="empty-state">
      <span class="icon">▭</span>
      <p>本棚はまだ空です<br>「＋ 追加」でPDFを選んでください</p>
    </div>
    <div id="shelf-grid"></div>
  </div>
</div>

<div id="edit-bar">
  <p>✕ ボタンで削除</p>
  <button id="edit-done" type="button">完了</button>
</div>

<!-- READER -->
<div id="reader">
  <div id="r-top">
    <button id="r-back" type="button">← 本棚</button>
    <div id="r-title">—</div>
    <div style="display:flex;gap:6px;">
      <button id="r-bm" type="button">🔖</button>
      <button id="r-fs" type="button">全画面</button>
    </div>
  </div>
  <div id="page-wrap">
    <div id="zoom-layer">
      <div class="page-cv" id="cv-a"><canvas id="canvas-a"></canvas></div>
      <div class="page-cv" id="cv-b"><canvas id="canvas-b"></canvas></div>
    </div>
    <div id="fs-hint">タップしてUIを表示</div>
  </div>
  <div id="r-bot">
    <div class="bot-row">
      <button class="nbtn" id="prev" type="button" disabled>◀</button>
      <div id="pinfo">—</div>
      <button class="nbtn" id="next" type="button">▶</button>
    </div>
    <div id="scrub-row">
      <div id="scrub-track"><div id="scrub-thumb"></div></div>
      <div id="scrub-preview">
        <canvas id="scrub-cv"></canvas>
        <div id="scrub-pnum"></div>
      </div>
    </div>
  </div>
</div>

<!-- BOOKMARK PANEL -->
<div id="bm-panel">
  <div id="bm-header">
    <span id="bm-title">しおり</span>
    <button id="bm-add" type="button">＋ 現在のページ</button>
    <button id="bm-close" type="button">✕</button>
  </div>
  <div id="bm-list"></div>
  <div id="bm-empty">しおりはまだありません</div>
</div>
<div id="bm-overlay"></div>

<!-- LOADING -->
<div id="loadscreen">
  <p id="loadmsg">読み込み中…</p>
  <div class="ptrack"><div class="pfill" id="pfill"></div></div>
</div>
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let lib=[],pdfDoc=null,pageNum=1,totalPages=0,rendering=false;
const KEY='lecteur_ios_v3';

let frontSlot='a';
function frontCv(){return document.getElementById('canvas-'+frontSlot);}
function backCv(){return document.getElementById('canvas-'+(frontSlot==='a'?'b':'a'));}
function frontDiv(){return document.getElementById('cv-'+frontSlot);}
function backDiv(){return document.getElementById('cv-'+(frontSlot==='a'?'b':'a'));}

function save(){try{localStorage.setItem(KEY,JSON.stringify(lib));}catch(e){toast('容量不足です');}}
function loadLib(){try{const r=localStorage.getItem(KEY);if(r)lib=JSON.parse(r);}catch(e){lib=[];}}

let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2600);}
function showLoad(msg,pct){document.getElementById('loadscreen').classList.add('on');document.getElementById('loadmsg').textContent=msg;document.getElementById('pfill').style.width=pct+'%';}
function hideLoad(){document.getElementById('loadscreen').classList.remove('on');}

// ── FILE INPUT ──
const fi=document.getElementById('file-input');
let _fh=false;
function handleFile(){
  const f=fi.files&&fi.files[0];
  if(!f||_fh)return;
  _fh=true;setTimeout(()=>{_fh=false;},2000);
  if(!f.name.toLowerCase().endsWith('.pdf')&&f.type!=='application/pdf'){toast('PDFを選んでください');return;}
  importPDF(f);
  setTimeout(()=>{try{fi.value='';}catch(e){}},200);
}
fi.addEventListener('change',handleFile);
fi.addEventListener('input',handleFile);
window.addEventListener('focus',()=>{setTimeout(()=>{if(fi.files&&fi.files[0]&&!_fh)handleFile();},500);});

async function importPDF(file){
  showLoad('読み込み中…',10);
  const reader=new FileReader();
  reader.onerror=()=>{hideLoad();toast('読み込みに失敗しました');};
  reader.onload=async()=>{
    try{
      const b64=reader.result.split(',')[1];
      const bin=atob(b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      showLoad('解析中…',40);
      const pdfdoc=await pdfjsLib.getDocument({data:bytes}).promise;
      showLoad('表紙を生成中…',65);
      const cover=await makeCover(pdfdoc);
      showLoad('保存中…',85);
      const id='bk'+Date.now();
      const name=file.name.replace(/\.pdf$/i,'');
      lib.push({id,name,data:b64,pages:pdfdoc.numPages,cover,ts:Date.now()});
      save();hideLoad();renderLib();
      toast('「'+name+'」を追加しました');
    }catch(e){hideLoad();toast('エラー: '+(e.message||'').slice(0,40));console.error(e);}
  };
  reader.readAsDataURL(file);
}

async function makeCover(pdfdoc){
  try{
    const p=await pdfdoc.getPage(1);
    const vp=p.getViewport({scale:0.5});
    const cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await p.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv.toDataURL('image/jpeg',0.7);
  }catch{return null;}
}

// ── LIBRARY ──
const PALS=[['#4a6858','#eef4f0'],['#3d5a7a','#e8f0f8'],['#5a6e3a','#eef4e0'],['#6a4858','#f4e8f0'],['#4a5868','#e8f0f4'],['#6a5a3a','#f4f0e0']];
function hsh(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h;}

function renderLib(){
  const grid=document.getElementById('shelf-grid');
  const empty=document.getElementById('empty-state');
  grid.innerHTML='';
  if(!lib.length){empty.style.display='block';return;}
  empty.style.display='none';
  const SZ=5;
  for(let i=0;i<lib.length;i+=SZ){
    const unit=document.createElement('div');unit.className='shelf-unit';
    const lbl=document.createElement('div');lbl.className='shelf-label';lbl.textContent='shelf '+(Math.floor(i/SZ)+1);
    const board=document.createElement('div');board.className='shelf-board';
    lib.slice(i,i+SZ).forEach(b=>board.appendChild(makeCard(b)));
    unit.appendChild(lbl);unit.appendChild(board);grid.appendChild(unit);
  }
}

function makeCard(book){
  const[bg,fg]=PALS[Math.abs(hsh(book.id))%PALS.length];
  const card=document.createElement('div');card.className='book-card';
  const wrap=document.createElement('div');wrap.className='spine-wrap';wrap.style.background=bg;
  if(book.cover){
    const img=document.createElement('img');img.src=book.cover;img.alt='';
    const ov=document.createElement('div');ov.className='spine-overlay';ov.textContent=book.name;
    wrap.appendChild(img);wrap.appendChild(ov);
  }else{
    const nc=document.createElement('div');nc.className='spine-nocover';
    nc.innerHTML='<div class="si">◻</div><div class="st" style="color:'+fg+'">'+esc(book.name)+'</div>';
    wrap.appendChild(nc);
  }
  wrap.appendChild(Object.assign(document.createElement('div'),{className:'spine-edge'}));
  const del=document.createElement('button');del.className='del-btn';del.type='button';del.textContent='✕';
  del.addEventListener('click',e=>{e.stopPropagation();if(confirm('「'+book.name+'」を削除しますか？')){lib=lib.filter(b=>b.id!==book.id);save();renderLib();}});
  const meta=document.createElement('div');meta.className='book-meta';meta.textContent=book.pages+' pp.';
  card.appendChild(wrap);card.appendChild(del);card.appendChild(meta);
  card.addEventListener('click',()=>{if(!document.body.classList.contains('edit'))openBook(book.id);});
  return card;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('edit-mode-btn').addEventListener('click',()=>document.body.classList.add('edit'));
document.getElementById('edit-done').addEventListener('click',()=>document.body.classList.remove('edit'));

// ── OPEN BOOK ──
async function openBook(id){
  const book=lib.find(b=>b.id===id);if(!book)return;
  showLoad('展開中…',20);
  try{
    const bin=atob(book.data);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    totalPages=pdfDoc.numPages;pageNum=1;rendering=false;
    currentBookId=id;
    document.getElementById('r-title').textContent=book.name;
    document.getElementById('library-screen').style.display='none';
    document.getElementById('reader').classList.add('on');
    // reset slots
    frontSlot='a';
    document.getElementById('cv-a').style.cssText='opacity:1;z-index:2;';
    document.getElementById('cv-b').style.cssText='opacity:0;z-index:1;';
    hideLoad();
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    await renderPage(pageNum);
    updateNav();
  }catch(e){hideLoad();toast('エラー: '+(e.message||'').slice(0,40));console.error(e);}
}

document.getElementById('r-back').addEventListener('click',()=>{
  document.getElementById('reader').classList.remove('on');
  document.getElementById('library-screen').style.display='block';
  pdfDoc=null;rendering=false;
});

// ── RENDER PAGE ──
async function renderPage(pn){
  if(!pdfDoc||rendering)return;
  rendering=true;
  try{
    const wrap=document.getElementById('page-wrap');
    const W=wrap.clientWidth||window.innerWidth;
    const H=wrap.clientHeight||(window.innerHeight-50-88);
    const dpr=window.devicePixelRatio||2;
    const page=await pdfDoc.getPage(pn);
    const pv=page.getViewport({scale:1});
    const scale=Math.min(W/pv.width,H/pv.height)*dpr;
    const vp=page.getViewport({scale});
    const cv=backCv();
    cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    cv.style.width=Math.round(vp.width/dpr)+'px';cv.style.height=Math.round(vp.height/dpr)+'px';
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#f8faf8';ctx.fillRect(0,0,cv.width,cv.height);
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    // crossfade
    const bd=backDiv();const fd=frontDiv();
    bd.style.zIndex='3';bd.style.opacity='1';
    fd.style.opacity='0';fd.style.zIndex='1';
    await new Promise(r=>setTimeout(r,240));
    frontSlot=frontSlot==='a'?'b':'a';
    document.getElementById('cv-a').style.zIndex=frontSlot==='a'?'2':'1';
    document.getElementById('cv-b').style.zIndex=frontSlot==='b'?'2':'1';
    pageNum=pn;
    updateInfo();
    updateBmBtn();
  }catch(e){console.error(e);}
  rendering=false;
}

// ── NAVIGATION ──
async function goNext(){if(rendering||pageNum>=totalPages)return;resetZoom();await renderPage(pageNum+1);updateNav();}
async function goPrev(){if(rendering||pageNum<=1)return;resetZoom();await renderPage(pageNum-1);updateNav();}

document.getElementById('prev').addEventListener('click',goPrev);
document.getElementById('next').addEventListener('click',goNext);

function updateNav(){
  document.getElementById('prev').disabled=pageNum<=1;
  document.getElementById('next').disabled=pageNum>=totalPages;
  updateThumb();
}
function updateInfo(){
  document.getElementById('pinfo').innerHTML='<strong>'+pageNum+'</strong> / '+totalPages;
}

// ── PINCH ZOOM + SWIPE ──
let zoomScale=1, zoomX=0, zoomY=0;
let pStart={},gestureActive=false;
let tx=0,ty=0,tc=0;

const pw=document.getElementById('page-wrap');
const zl=document.getElementById('zoom-layer');

function applyZoom(scale,ox,oy,animated){
  zl.style.transition=animated?'transform 0.2s ease':'none';
  zl.style.transform='translate('+ox+'px,'+oy+'px) scale('+scale+')';
}

function clampPan(scale,ox,oy){
  const wrap=pw.getBoundingClientRect();
  const W=wrap.width,H=wrap.height;
  const maxX=W*(scale-1)/2;
  const maxY=H*(scale-1)/2;
  return{
    x:Math.max(-maxX,Math.min(maxX,ox)),
    y:Math.max(-maxY,Math.min(maxY,oy))
  };
}

function resetZoom(){
  zoomScale=1;zoomX=0;zoomY=0;
  applyZoom(1,0,0,true);
}

pw.addEventListener('touchstart',e=>{
  tc=e.touches.length;
  if(tc===1){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
    gestureActive=false;
  }else if(tc===2){
    gestureActive=true;
    const t0=e.touches[0],t1=e.touches[1];
    pStart.dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    pStart.scale=zoomScale;
    pStart.midX=(t0.clientX+t1.clientX)/2;
    pStart.midY=(t0.clientY+t1.clientY)/2;
    pStart.ox=zoomX;pStart.oy=zoomY;
  }
},{passive:false});

pw.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    gestureActive=true;tc=2;
    const t0=e.touches[0],t1=e.touches[1];
    const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    const newScale=Math.max(1,Math.min(5,pStart.scale*(dist/pStart.dist)));
    const midX=(t0.clientX+t1.clientX)/2;
    const midY=(t0.clientY+t1.clientY)/2;
    // pan from mid point movement + zoom anchored to pinch center
    const scaleRatio=newScale/pStart.scale;
    const rect=pw.getBoundingClientRect();
    // vector from wrap center to pinch start mid
    const originX=pStart.midX-rect.left-rect.width/2;
    const originY=pStart.midY-rect.top-rect.height/2;
    // new offset: scale around pinch origin + pan delta
    const panDX=midX-pStart.midX;
    const panDY=midY-pStart.midY;
    const newX=originX*(1-scaleRatio)+pStart.ox*scaleRatio+panDX;
    const newY=originY*(1-scaleRatio)+pStart.oy*scaleRatio+panDY;
    const clamped=clampPan(newScale,newX,newY);
    zoomScale=newScale;zoomX=clamped.x;zoomY=clamped.y;
    applyZoom(zoomScale,zoomX,zoomY,false);
  }else if(e.touches.length===1&&!gestureActive&&zoomScale>1){
    // pan while zoomed with 1 finger
    const dx=e.touches[0].clientX-tx;
    const dy=e.touches[0].clientY-ty;
    const clamped=clampPan(zoomScale,zoomX+dx,zoomY+dy);
    zoomX=clamped.x;zoomY=clamped.y;
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
    applyZoom(zoomScale,zoomX,zoomY,false);
  }
},{passive:false});

pw.addEventListener('touchend',e=>{
  if(gestureActive){
    gestureActive=false;tc=0;
    // snap back to 1 if nearly at 1
    if(zoomScale<1.05)resetZoom();
    return;
  }
  if(tc>1){tc=0;return;}
  tc=0;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;

  // tap (no movement) → toggle UI if hidden
  if(Math.abs(dx)<10&&Math.abs(dy)<10){
    if(uiHidden)toggleUI();
    return;
  }

  // swipe — only when not zoomed or at edge
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
  if(zoomScale>1.05){
    const wrap=pw.getBoundingClientRect();
    const maxX=wrap.width*(zoomScale-1)/2;
    const atL=zoomX>=-maxX+4;
    const atR=zoomX<=maxX-4;
    if(dx<0&&atR)return; // can still pan right
    if(dx>0&&atL)return; // can still pan left
  }
  if(dx<0)goNext();else goPrev();
});

// double-tap to zoom in/out
let lastTap=0;
pw.addEventListener('touchend',e=>{
  if(e.changedTouches.length!==1)return;
  const now=Date.now();
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15&&now-lastTap<300){
    if(zoomScale>1.05){resetZoom();}
    else{
      zoomScale=2.5;zoomX=0;zoomY=0;
      applyZoom(zoomScale,zoomX,zoomY,true);
    }
  }
  lastTap=now;
},{passive:true});

// ── SCRUBBAR ──
let scrubbing=false,previewPage=-1,previewThrottle=null;

function updateThumb(){
  const pct=totalPages<=1?0:(pageNum-1)/(totalPages-1);
  document.getElementById('scrub-thumb').style.left=(pct*100)+'%';
}

async function showScrubPreview(pn,xPx){
  if(!pdfDoc)return;
  const preview=document.getElementById('scrub-preview');
  const rowRect=document.getElementById('scrub-row').getBoundingClientRect();
  const cx=Math.max(44,Math.min(xPx,rowRect.width-44));
  preview.style.left=cx+'px';
  preview.classList.add('show');
  document.getElementById('scrub-pnum').textContent=pn+' / '+totalPages;
  if(previewPage===pn)return;
  previewPage=pn;
  if(previewThrottle)clearTimeout(previewThrottle);
  previewThrottle=setTimeout(async()=>{
    try{
      const page=await pdfDoc.getPage(pn);
      const vp=page.getViewport({scale:0.35});
      const cv=document.getElementById('scrub-cv');
      cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
      cv.style.width='80px';cv.style.height=Math.round(vp.height*(80/vp.width))+'px';
      const c=cv.getContext('2d');c.fillStyle='#f8faf8';c.fillRect(0,0,cv.width,cv.height);
      await page.render({canvasContext:c,viewport:vp}).promise;
    }catch(e){}
  },100);
}

function hideScrubPreview(){document.getElementById('scrub-preview').classList.remove('show');previewPage=-1;}

function scrubToX(clientX){
  const track=document.getElementById('scrub-track');
  const rect=track.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
  const tp=Math.max(1,Math.round(pct*(totalPages-1))+1);
  document.getElementById('scrub-thumb').style.left=(pct*100)+'%';
  const rowRect=document.getElementById('scrub-row').getBoundingClientRect();
  showScrubPreview(tp,clientX-rowRect.left);
  return tp;
}

const st=document.getElementById('scrub-track');
st.addEventListener('touchstart',e=>{e.stopPropagation();scrubbing=true;scrubToX(e.touches[0].clientX);},{passive:false});
st.addEventListener('touchmove',e=>{if(!scrubbing)return;e.preventDefault();e.stopPropagation();scrubToX(e.touches[0].clientX);},{passive:false});
st.addEventListener('touchend',async e=>{
  if(!scrubbing)return;scrubbing=false;
  const tp=scrubToX(e.changedTouches[0].clientX);
  hideScrubPreview();
  if(tp!==pageNum){rendering=false;await renderPage(tp);updateNav();}
});
st.addEventListener('mousedown',e=>{scrubbing=true;scrubToX(e.clientX);});
window.addEventListener('mousemove',e=>{if(scrubbing)scrubToX(e.clientX);});
window.addEventListener('mouseup',async e=>{
  if(!scrubbing)return;scrubbing=false;
  const tp=scrubToX(e.clientX);hideScrubPreview();
  if(tp!==pageNum){rendering=false;await renderPage(tp);updateNav();}
});

// ── BOOKMARKS ──
let currentBookId=null;

function bmKey(){return 'bm_'+currentBookId;}
function loadBm(){try{const r=localStorage.getItem(bmKey());return r?JSON.parse(r):[];}catch{return[];}}
function saveBm(bms){try{localStorage.setItem(bmKey(),JSON.stringify(bms));}catch(e){toast('保存できませんでした');}}

function openBmPanel(){
  document.getElementById('bm-panel').classList.add('on');
  document.getElementById('bm-overlay').classList.add('on');
  renderBmList();
}
function closeBmPanel(){
  document.getElementById('bm-panel').classList.remove('on');
  document.getElementById('bm-overlay').classList.remove('on');
}

function renderBmList(){
  const bms=loadBm();
  const list=document.getElementById('bm-list');
  const empty=document.getElementById('bm-empty');
  list.innerHTML='';
  if(!bms.length){empty.style.display='block';return;}
  empty.style.display='none';
  bms.sort((a,b)=>a.page-b.page).forEach(bm=>{
    const item=document.createElement('div');item.className='bm-item';
    item.innerHTML=
      '<span class="bm-icon">🔖</span>'+
      '<div class="bm-info">'+
        '<div class="bm-page">p. '+bm.page+'</div>'+
        '<div class="bm-label">'+esc(bm.label)+'</div>'+
      '</div>'+
      '<button class="bm-del" type="button" data-id="'+bm.id+'">✕</button>';
    item.querySelector('.bm-del').addEventListener('click',e=>{
      e.stopPropagation();
      const id=e.target.dataset.id;
      const updated=loadBm().filter(b=>b.id!==id);
      saveBm(updated);renderBmList();
    });
    item.addEventListener('click',e=>{
      if(e.target.classList.contains('bm-del'))return;
      closeBmPanel();
      rendering=false;
      renderPage(bm.page).then(()=>updateNav());
    });
    list.appendChild(item);
  });
}

function addBookmark(){
  const bms=loadBm();
  // avoid duplicate page
  if(bms.find(b=>b.page===pageNum)){toast('このページはすでに登録済みです');return;}
  const label=document.getElementById('r-title').textContent||'';
  bms.push({id:'bm'+Date.now(),page:pageNum,label:label+' — p.'+pageNum});
  saveBm(bms);renderBmList();
  toast('p.'+pageNum+' をしおりに追加しました');
  updateBmBtn();
}

function updateBmBtn(){
  const bms=loadBm();
  const active=bms.find(b=>b.page===pageNum);
  document.getElementById('r-bm').style.opacity=active?'1':'0.6';
  document.getElementById('r-bm').title=active?'しおり済み':'しおりに追加';
}

document.getElementById('r-bm').addEventListener('click',openBmPanel);
document.getElementById('bm-add').addEventListener('click',addBookmark);
document.getElementById('bm-close').addEventListener('click',closeBmPanel);
document.getElementById('bm-overlay').addEventListener('click',closeBmPanel);
let uiHidden=false;
document.getElementById('r-fs').addEventListener('click',toggleUI);
function toggleUI(){
  uiHidden=!uiHidden;
  const top=document.getElementById('r-top');
  const bot=document.getElementById('r-bot');
  top.style.display=uiHidden?'none':'flex';
  bot.style.display=uiHidden?'none':'flex';
  if(uiHidden){
    const hint=document.getElementById('fs-hint');
    hint.style.display='block';
    hint.style.animation='none';void hint.offsetWidth;
    hint.style.animation='fadeout 2.5s forwards';
    setTimeout(()=>{hint.style.display='none';},2600);
  }
}

// ── INIT ──
loadLib();renderLib();
</script>
