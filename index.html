<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lecteur</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --cream:#f5f0e8;--tan:#e8dece;--walnut:#5c3d2e;--walnut-lt:#7a5240;
  --terra:#c4623a;--mustard:#c9972a;--charcoal:#2e2a25;--paper:#faf7f2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);}

/* ── LIBRARY ── */
#lib-header{
  background:var(--charcoal);padding:0 1.2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;border-bottom:3px solid var(--terra);
}
#lib-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;letter-spacing:0.06em;color:var(--cream);}
#lib-header h1 em{color:var(--terra);font-style:italic;}
.hdr-right{display:flex;align-items:center;gap:8px;}
#edit-mode-btn{
  background:transparent;border:1.5px solid rgba(245,240,232,0.3);color:var(--tan);
  height:40px;padding:0 14px;border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;
}
.add-wrap{position:relative;height:40px;min-width:80px;}
.add-label{
  position:absolute;inset:0;background:var(--terra);color:var(--cream);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;pointer-events:none;
}
#file-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px;}
#shelf-wrap{padding:1.5rem 1.2rem 4rem;max-width:960px;margin:0 auto;}
#empty-state{text-align:center;padding:4rem 1rem;}
#empty-state .icon{font-size:2.8rem;opacity:0.35;display:block;margin-bottom:1rem;}
#empty-state p{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--walnut-lt);line-height:2;opacity:0.7;}
.shelf-unit{margin-bottom:2rem;}
.shelf-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--walnut-lt);margin-bottom:0.5rem;font-weight:500;}
.shelf-board{
  background:var(--walnut);border-radius:2px 2px 0 0;
  padding:1.1rem 1rem 0.9rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;
  box-shadow:0 5px 0 var(--walnut-lt),0 8px 18px rgba(0,0,0,0.2);position:relative;
}
.shelf-board::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--terra),var(--mustard),var(--terra));border-radius:2px 2px 0 0;opacity:0.5;}
.book-card{width:calc(20% - 0.82rem);max-width:90px;position:relative;transition:transform 0.18s;flex-shrink:0;cursor:pointer;}
.book-card:active{transform:translateY(-4px) scale(0.97);}
@media(max-width:480px){.book-card{width:calc(25% - 0.78rem);}}
.spine-wrap{width:100%;padding-top:150%;border-radius:1px 4px 4px 1px;overflow:hidden;position:relative;box-shadow:-2px 2px 10px rgba(0,0,0,0.5);}
.spine-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.spine-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(20,16,12,0.8));padding:1rem 0.35rem 0.35rem;font-size:0.58rem;color:#fff;line-height:1.3;word-break:break-all;}
.spine-nocover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.4rem;text-align:center;}
.spine-nocover .si{font-size:1.2rem;margin-bottom:0.3rem;opacity:0.75;}
.spine-nocover .st{font-size:0.55rem;line-height:1.3;word-break:break-all;font-family:'Playfair Display',serif;font-style:italic;}
.spine-edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(0,0,0,0.22);}
.del-btn{display:none;position:absolute;top:-6px;right:-6px;background:var(--terra);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:0.72rem;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
body.edit .del-btn{display:flex;}
.book-meta{font-size:0.58rem;color:var(--tan);margin-top:0.4rem;text-align:center;}
#edit-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--charcoal);border-top:2px solid var(--terra);padding:0.8rem 1.2rem;justify-content:space-between;align-items:center;z-index:100;}
body.edit #edit-bar{display:flex;}
#edit-bar p{font-size:0.8rem;color:var(--tan);font-weight:300;}
#edit-done{background:var(--terra);border:none;color:var(--cream);padding:0 20px;height:40px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-weight:500;}

/* ── READER ── */
#reader{
  display:none;position:fixed;inset:0;
  background:#8a847c;
  flex-direction:column;align-items:center;z-index:200;
  touch-action:none;
}
#reader.on{display:flex;}

#r-top{
  width:100%;background:rgba(46,42,37,0.94);
  border-bottom:1px solid rgba(196,98,58,0.35);
  height:52px;padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#r-back,#r-fs{
  background:transparent;border:1px solid rgba(245,240,232,0.2);color:var(--tan);
  height:36px;padding:0 12px;border-radius:3px;
  font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;
}
#r-title{font-family:'Playfair Display',serif;font-style:italic;font-size:0.9rem;color:var(--tan);max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* page canvas area */
#page-wrap{
  flex:1;width:100%;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
/* two canvases — current and next, for crossfade */
.page-cv{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--paper);
  transition:opacity 0.22s ease;
}
.page-cv canvas{display:block;max-width:100%;max-height:100%;}
#cv-a{opacity:1;z-index:2;}
#cv-b{opacity:0;z-index:1;}

/* ── BOTTOM BAR ── */
#r-bot{
  width:100%;background:rgba(46,42,37,0.94);
  border-top:1px solid rgba(196,98,58,0.18);
  padding:0.5rem 1.2rem 0.4rem;
  display:flex;flex-direction:column;gap:0.4rem;
  flex-shrink:0;
}
.bot-row{display:flex;align-items:center;justify-content:space-between;}
.nbtn{
  background:transparent;border:1.5px solid rgba(196,98,58,0.32);color:var(--tan);
  width:44px;height:44px;border-radius:50%;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.nbtn:active{transform:scale(0.9);}
.nbtn:disabled{opacity:0.15;pointer-events:none;}
#pinfo{font-family:'Playfair Display',serif;font-style:italic;font-size:0.82rem;color:rgba(232,222,206,0.5);text-align:center;flex:1;}
#pinfo strong{color:var(--tan);font-weight:400;}

/* scrubbar */
#scrub-row{position:relative;padding:0 4px 2px;}
#scrub-track{
  width:100%;height:4px;background:rgba(255,255,255,0.15);
  border-radius:2px;position:relative;cursor:pointer;
}
#scrub-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:18px;height:18px;border-radius:50%;
  background:var(--terra);border:2px solid rgba(255,255,255,0.8);
  left:0%;pointer-events:none;
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
#scrub-preview{
  display:none;position:absolute;bottom:14px;
  background:var(--paper);border-radius:4px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  overflow:hidden;pointer-events:none;
  transform:translateX(-50%);
  border:1px solid rgba(196,98,58,0.3);
  min-width:80px;
}
#scrub-preview.show{display:block;}
#scrub-cv{display:block;}
#scrub-pnum{text-align:center;padding:3px 0 4px;font-family:'Playfair Display',serif;font-style:italic;font-size:0.65rem;color:var(--walnut-lt);border-top:1px solid rgba(0,0,0,0.08);}

/* ── LOADING ── */
#loadscreen{display:none;position:fixed;inset:0;background:rgba(22,18,14,0.93);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
#loadscreen.on{display:flex;}
#loadmsg{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--tan);}
.ptrack{width:180px;height:2px;background:rgba(196,98,58,0.18);}
.pfill{height:100%;background:var(--terra);transition:width 0.3s;width:0%;}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(46,42,37,0.95);color:var(--cream);padding:9px 18px;border-radius:18px;font-size:0.8rem;opacity:0;transition:opacity 0.28s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library-screen">
  <div id="lib-header">
    <h1>Lec<em>teur</em></h1>
    <div class="hdr-right">
      <button id="edit-mode-btn" type="button">編集</button>
      <div class="add-wrap">
        <div class="add-label">＋ 追加</div>
        <input type="file" id="file-input" accept=".pdf,application/pdf">
      </div>
    </div>
  </div>
  <div id="shelf-wrap">
    <div id="empty-state">
      <span class="icon">▭</span>
      <p>本棚はまだ空です<br>「＋ 追加」でPDFを選んでください</p>
    </div>
    <div id="shelf-grid"></div>
  </div>
</div>

<div id="edit-bar">
  <p>✕ ボタンで削除</p>
  <button id="edit-done" type="button">完了</button>
</div>

<!-- READER -->
<div id="reader">
  <div id="r-top">
    <button id="r-back" type="button">← 本棚</button>
    <div id="r-title">—</div>
    <button id="r-fs" type="button">全画面</button>
  </div>
  <div id="page-wrap">
    <div class="page-cv" id="cv-a"><canvas id="canvas-a"></canvas></div>
    <div class="page-cv" id="cv-b"><canvas id="canvas-b"></canvas></div>
  </div>
  <div id="r-bot">
    <div class="bot-row">
      <button class="nbtn" id="prev" type="button" disabled>◀</button>
      <div id="pinfo">—</div>
      <button class="nbtn" id="next" type="button">▶</button>
    </div>
    <div id="scrub-row">
      <div id="scrub-track"><div id="scrub-thumb"></div></div>
      <div id="scrub-preview">
        <canvas id="scrub-cv"></canvas>
        <div id="scrub-pnum"></div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loadscreen">
  <p id="loadmsg">読み込み中…</p>
  <div class="ptrack"><div class="pfill" id="pfill"></div></div>
</div>

<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let lib=[],pdfDoc=null,pageNum=1,totalPages=0,rendering=false;
const KEY='lecteur_ios_v3';

// which canvas slot is "front"
let frontSlot='a'; // 'a' or 'b'
function frontCv(){return document.getElementById('canvas-'+frontSlot);}
function backCv(){return document.getElementById('canvas-'+(frontSlot==='a'?'b':'a'));}
function frontDiv(){return document.getElementById('cv-'+frontSlot);}
function backDiv(){return document.getElementById('cv-'+(frontSlot==='a'?'b':'a'));}

// ── PERSIST ──
function save(){try{localStorage.setItem(KEY,JSON.stringify(lib));}catch(e){toast('容量不足です');}};
function loadLib(){try{const r=localStorage.getItem(KEY);if(r)lib=JSON.parse(r);}catch(e){lib=[];}}

// ── TOAST ──
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2600);}

// ── LOADING ──
function showLoad(msg,pct){document.getElementById('loadscreen').classList.add('on');document.getElementById('loadmsg').textContent=msg;document.getElementById('pfill').style.width=pct+'%';}
function hideLoad(){document.getElementById('loadscreen').classList.remove('on');}

// ── FILE INPUT ──
const fi=document.getElementById('file-input');
let _fh=false;
function handleFile(){
  const f=fi.files&&fi.files[0];
  if(!f||_fh)return;
  _fh=true;setTimeout(()=>{_fh=false;},2000);
  if(!f.name.toLowerCase().endsWith('.pdf')&&f.type!=='application/pdf'){toast('PDFを選んでください');return;}
  importPDF(f);
  setTimeout(()=>{try{fi.value='';}catch(e){}},200);
}
fi.addEventListener('change',handleFile);
fi.addEventListener('input',handleFile);
window.addEventListener('focus',()=>{setTimeout(()=>{if(fi.files&&fi.files[0]&&!_fh)handleFile();},500);});

async function importPDF(file){
  showLoad('読み込み中…',10);
  const reader=new FileReader();
  reader.onerror=()=>{hideLoad();toast('読み込みに失敗しました');};
  reader.onload=async()=>{
    try{
      const dataUrl=reader.result;
      const b64=dataUrl.split(',')[1];
      const binary=atob(b64);
      const bytes=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
      showLoad('解析中…',40);
      const pdfdoc=await pdfjsLib.getDocument({data:bytes}).promise;
      showLoad('表紙を生成中…',65);
      const cover=await makeCover(pdfdoc);
      showLoad('保存中…',85);
      const id='bk'+Date.now();
      const name=file.name.replace(/\.pdf$/i,'');
      lib.push({id,name,data:b64,pages:pdfdoc.numPages,cover,ts:Date.now()});
      save();hideLoad();renderLib();
      toast('「'+name+'」を追加しました');
    }catch(e){hideLoad();toast('エラー: '+(e.message||'').slice(0,40));console.error(e);}
  };
  reader.readAsDataURL(file);
}

async function makeCover(pdfdoc){
  try{
    const p=await pdfdoc.getPage(1);
    const vp=p.getViewport({scale:0.5});
    const cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await p.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv.toDataURL('image/jpeg',0.7);
  }catch{return null;}
}

// ── LIBRARY ──
const PALS=[['#c4623a','#f5f0e8'],['#2e5266','#d4e8d6'],['#5c6e2e','#f5f0e0'],['#7a3b4e','#f0e6d8'],['#4a5568','#e8e0d0'],['#8b5e2e','#f5ead0']];
function hsh(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h;}

function renderLib(){
  const grid=document.getElementById('shelf-grid');
  const empty=document.getElementById('empty-state');
  grid.innerHTML='';
  if(!lib.length){empty.style.display='block';return;}
  empty.style.display='none';
  const SZ=5;
  for(let i=0;i<lib.length;i+=SZ){
    const unit=document.createElement('div');unit.className='shelf-unit';
    const lbl=document.createElement('div');lbl.className='shelf-label';lbl.textContent='Shelf '+(Math.floor(i/SZ)+1);
    const board=document.createElement('div');board.className='shelf-board';
    lib.slice(i,i+SZ).forEach(b=>board.appendChild(makeCard(b)));
    unit.appendChild(lbl);unit.appendChild(board);grid.appendChild(unit);
  }
}

function makeCard(book){
  const[bg,fg]=PALS[Math.abs(hsh(book.id))%PALS.length];
  const card=document.createElement('div');card.className='book-card';
  const wrap=document.createElement('div');wrap.className='spine-wrap';wrap.style.background=bg;
  if(book.cover){
    const img=document.createElement('img');img.src=book.cover;img.alt='';
    const ov=document.createElement('div');ov.className='spine-overlay';ov.textContent=book.name;
    wrap.appendChild(img);wrap.appendChild(ov);
  }else{
    const nc=document.createElement('div');nc.className='spine-nocover';
    nc.innerHTML='<div class="si">◻</div><div class="st" style="color:'+fg+'">'+esc(book.name)+'</div>';
    wrap.appendChild(nc);
  }
  wrap.appendChild(Object.assign(document.createElement('div'),{className:'spine-edge'}));
  const del=document.createElement('button');del.className='del-btn';del.type='button';del.textContent='✕';
  del.addEventListener('click',e=>{e.stopPropagation();if(confirm('「'+book.name+'」を削除しますか？')){lib=lib.filter(b=>b.id!==book.id);save();renderLib();}});
  const meta=document.createElement('div');meta.className='book-meta';meta.textContent=book.pages+' pp.';
  card.appendChild(wrap);card.appendChild(del);card.appendChild(meta);
  card.addEventListener('click',()=>{if(!document.body.classList.contains('edit'))openBook(book.id);});
  return card;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('edit-mode-btn').addEventListener('click',()=>document.body.classList.add('edit'));
document.getElementById('edit-done').addEventListener('click',()=>document.body.classList.remove('edit'));

// ── OPEN BOOK ──
async function openBook(id){
  const book=lib.find(b=>b.id===id);if(!book)return;
  showLoad('展開中…',20);
  try{
    const binary=atob(book.data);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    totalPages=pdfDoc.numPages;pageNum=1;
    document.getElementById('r-title').textContent=book.name;
    document.getElementById('library-screen').style.display='none';
    document.getElementById('reader').classList.add('on');
    // reset slots
    frontSlot='a';
    document.getElementById('cv-a').style.opacity='1';
    document.getElementById('cv-b').style.opacity='0';
    hideLoad();
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    await renderPage(pageNum);
    updateNav();
  }catch(e){hideLoad();toast('エラー: '+(e.message||'').slice(0,40));console.error(e);}
}

document.getElementById('r-back').addEventListener('click',()=>{
  document.getElementById('reader').classList.remove('on');
  document.getElementById('library-screen').style.display='block';
  pdfDoc=null;rendering=false;
});

// ── RENDER PAGE (crossfade) ──
async function renderPage(pn){
  if(!pdfDoc||rendering)return;
  rendering=true;
  try{
    const wrap=document.getElementById('page-wrap');
    const W=wrap.clientWidth||window.innerWidth;
    const H=wrap.clientHeight||(window.innerHeight-108-64);
    const dpr=window.devicePixelRatio||2;

    const page=await pdfDoc.getPage(pn);
    const pv=page.getViewport({scale:1});
    const scale=Math.min(W/pv.width,H/pv.height)*dpr;
    const vp=page.getViewport({scale});

    // render into back canvas
    const cv=backCv();
    cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    cv.style.width=Math.round(vp.width/dpr)+'px';cv.style.height=Math.round(vp.height/dpr)+'px';
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#faf7f2';ctx.fillRect(0,0,cv.width,cv.height);
    await page.render({canvasContext:ctx,viewport:vp}).promise;

    // crossfade: bring back to front
    backDiv().style.zIndex='3';
    backDiv().style.opacity='1';
    frontDiv().style.opacity='0';
    frontDiv().style.zIndex='1';

    // after transition, swap slots
    await new Promise(r=>setTimeout(r,240));
    frontSlot=frontSlot==='a'?'b':'a';
    // reset z-index
    document.getElementById('cv-a').style.zIndex=frontSlot==='a'?'2':'1';
    document.getElementById('cv-b').style.zIndex=frontSlot==='b'?'2':'1';

    pageNum=pn;
    updateInfo();
  }catch(e){console.error(e);}
  rendering=false;
}

// ── NAVIGATION ──
async function goNext(){
  if(rendering||pageNum>=totalPages)return;
  await renderPage(pageNum+1);
  updateNav();
}
async function goPrev(){
  if(rendering||pageNum<=1)return;
  await renderPage(pageNum-1);
  updateNav();
}

document.getElementById('prev').addEventListener('click',goPrev);
document.getElementById('next').addEventListener('click',goNext);

function updateNav(){
  document.getElementById('prev').disabled=pageNum<=1;
  document.getElementById('next').disabled=pageNum>=totalPages;
  updateThumb();
}
function updateInfo(){
  document.getElementById('pinfo').innerHTML='<strong>'+pageNum+'</strong> / '+totalPages;
}

// ── SWIPE ──
let tx=0,ty=0,tc=0;
const pw=document.getElementById('page-wrap');
pw.addEventListener('touchstart',e=>{
  tc=e.touches.length;
  if(tc===1){tx=e.touches[0].clientX;ty=e.touches[0].clientY;}
},{passive:true});
pw.addEventListener('touchmove',e=>{
  if(e.touches.length>1)tc=e.touches.length;
},{passive:true});
pw.addEventListener('touchend',e=>{
  if(tc>1){tc=0;return;}tc=0;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  // zoomed: only swipe at edge
  const vv=window.visualViewport;
  if(vv&&vv.scale>1.05){
    const atL=vv.offsetLeft<=2;
    const atR=vv.offsetLeft+vv.width>=vv.scale*window.innerWidth-2;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
    if(dx<0&&atR)goNext();
    else if(dx>0&&atL)goPrev();
    return;
  }
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
  if(dx<0)goNext();else goPrev();
});

// ── SCRUBBAR ──
let scrubbing=false,previewSpread=-1,previewThrottle=null;

function updateThumb(){
  const pct=totalPages<=1?0:(pageNum-1)/(totalPages-1);
  document.getElementById('scrub-thumb').style.left=(pct*100)+'%';
}

async function showScrubPreview(pn,xPx){
  if(!pdfDoc)return;
  const preview=document.getElementById('scrub-preview');
  const wrapRect=document.getElementById('scrub-row').getBoundingClientRect();
  const cx=Math.max(44,Math.min(xPx,wrapRect.width-44));
  preview.style.left=cx+'px';
  preview.classList.add('show');
  document.getElementById('scrub-pnum').textContent=pn+' / '+totalPages;
  if(previewSpread===pn)return;
  previewSpread=pn;
  if(previewThrottle)clearTimeout(previewThrottle);
  previewThrottle=setTimeout(async()=>{
    try{
      const page=await pdfDoc.getPage(pn);
      const vp=page.getViewport({scale:0.35});
      const cv=document.getElementById('scrub-cv');
      cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
      cv.style.width='80px';cv.style.height=Math.round(vp.height*(80/vp.width))+'px';
      const c=cv.getContext('2d');c.fillStyle='#faf7f2';c.fillRect(0,0,cv.width,cv.height);
      await page.render({canvasContext:c,viewport:vp}).promise;
    }catch(e){}
  },100);
}

function hideScrubPreview(){
  document.getElementById('scrub-preview').classList.remove('show');
  previewSpread=-1;
}

function scrubToX(clientX){
  const track=document.getElementById('scrub-track');
  const rect=track.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
  const targetPage=Math.round(pct*(totalPages-1))+1;
  document.getElementById('scrub-thumb').style.left=(pct*100)+'%';
  const rowRect=document.getElementById('scrub-row').getBoundingClientRect();
  showScrubPreview(targetPage,clientX-rowRect.left);
  return targetPage;
}

const st=document.getElementById('scrub-track');
st.addEventListener('touchstart',e=>{e.stopPropagation();scrubbing=true;scrubToX(e.touches[0].clientX);},{passive:false});
st.addEventListener('touchmove',e=>{if(!scrubbing)return;e.preventDefault();e.stopPropagation();scrubToX(e.touches[0].clientX);},{passive:false});
st.addEventListener('touchend',async e=>{
  if(!scrubbing)return;scrubbing=false;
  const tp=scrubToX(e.changedTouches[0].clientX);
  hideScrubPreview();
  if(tp!==pageNum){await renderPage(tp);updateNav();}
});
st.addEventListener('mousedown',e=>{scrubbing=true;scrubToX(e.clientX);});
window.addEventListener('mousemove',e=>{if(scrubbing)scrubToX(e.clientX);});
window.addEventListener('mouseup',async e=>{
  if(!scrubbing)return;scrubbing=false;
  const tp=scrubToX(e.clientX);hideScrubPreview();
  if(tp!==pageNum){await renderPage(tp);updateNav();}
});

// ── FULLSCREEN (tap page to toggle UI) ──
let uiHidden=false;
document.getElementById('r-fs').addEventListener('click',()=>{
  uiHidden=!uiHidden;
  const top=document.getElementById('r-top');
  const bot=document.getElementById('r-bot');
  top.style.display=uiHidden?'none':'flex';
  bot.style.display=uiHidden?'none':'flex';
  document.getElementById('r-fs').textContent=uiHidden?'UI表示':'全画面';
});

loadLib();renderLib();
